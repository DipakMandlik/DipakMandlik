name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate enterprise-blue contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%232563EB&color_dots=%23EEF3FA,%23DCEAFE,%2393C5FD,%2338BDF8,%232563EB&color_dots_border=%23D7E3F5
            dist/github-snake-dark.svg?color_snake=%2338BDF8&color_dots=%2316253F,%231E3A66,%232C4265,%232563EB,%2338BDF8&color_dots_border=%232C4265

      - name: Push snake SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
