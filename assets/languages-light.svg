<svg width="560" height="300" viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Most used languages">
  <rect x="1" y="1" width="558" height="298" rx="22" fill="#FFFFFF" stroke="#DCE6F5" stroke-width="1.3"/>
  <text x="28" y="38" font-family="'Segoe UI', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Most Used Languages</text>
  <g transform="translate(442,32)"><circle cx="0" cy="-4" r="3.4" fill="#8592A6"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/></circle><text x="10" y="0" font-family="'Segoe UI', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2" fill="#8592A6">SYNCING</text></g>
  <line x1="28" y1="52" x2="532" y2="52" stroke="#E4EBF5" stroke-width="1"/>
  
    <g transform="translate(28,70)">
      <text font-family="'Segoe UI', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#111827">Awaiting sync</text>
      <text x="504" y="0" text-anchor="end" font-family="'SFMono-Regular', 'Cascadia Code', Consolas, 'Courier New', monospace" font-size="12" fill="#64748B">0%</text>
      <rect x="0" y="10" width="380" height="8" rx="4" fill="#E4ECF8"/>
      <rect x="0" y="10" width="0" height="8" rx="4" fill="#2563EB">
        <animate attributeName="width" from="0" to="0.0" dur="1.2s" begin="0.00s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
      </rect>
    </g>
</svg>