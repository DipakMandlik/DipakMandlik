<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dipak Mandlik logo">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="80" cy="80" r="74" fill="none" stroke="url(#markGrad)" stroke-width="2" opacity="0.55" stroke-dasharray="6 10">
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="80" r="62" fill="none" stroke="url(#markGrad)" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="60;64;60" dur="4s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#glow)">
    <circle cx="80" cy="80" r="50" fill="#0F172A"/>
    <circle cx="80" cy="80" r="50" fill="url(#markGrad)" opacity="0.08"/>
    <text x="80" y="98" font-family="'Segoe UI', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700"
      text-anchor="middle" fill="url(#markGrad)">DM</text>
  </g>

  <circle cx="80" cy="80" r="50" fill="none" stroke="url(#markGrad)" stroke-width="1.6" opacity="0.8"/>
  <circle cx="130" cy="42" r="3.4" fill="#38BDF8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>